name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version tag
        id: tag
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.tag.outputs.OWNER }}/ci-frontend:${{ steps.tag.outputs.VERSION }}
            ghcr.io/${{ steps.tag.outputs.OWNER }}/ci-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          OWNER: ${{ steps.tag.outputs.OWNER }}
          ACTOR: ${{ github.actor }}
          TOKEN: ${{ secrets.GHCR_TOKEN }}
       
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          envs: OWNER,ACTOR,TOKEN
          script: |
            echo $TOKEN | docker login ghcr.io -u $ACTOR --password-stdin
            docker pull ghcr.io/$OWNER/ci-frontend:latest
            docker stop ci-frontend || true
            docker rm ci-frontend || true
            docker run -d --name ci-frontend -p 3000:3000 ghcr.io/$OWNER/ci-frontend:latest